spring.application.name=gateway-admin
server.port=8081

spring.cloud.gateway.routes:
  - id: auth-admin
    uri: http://localhost:8082
    predicates: Path=/api/v1/admin/auth/**
  - id: knowledge-admin
    uri: http://localhost:8083
    predicates: Path=/api/v1/admin/knowledge/**
  - id: analytics
    uri: http://localhost:8088
    predicates: Path=/api/v1/admin/analytics/**
  - id: avatar
    uri: http://localhost:8089
    predicates: Path=/api/v1/admin/avatar/**
  - id: safety-admin
    uri: http://localhost:8087
    predicates: Path=/api/v1/admin/emergency/**
