spring.application.name=gateway-tourist
server.port=8080

spring.cloud.gateway.routes:
  - id: auth-service
    uri: http://localhost:8082
    predicates: Path=/api/v1/tourist/auth/**
  - id: rag-query
    uri: http://localhost:8083
    predicates: Path=/api/v1/tourist/rag/**
  - id: ai-proxy
    uri: http://localhost:8084
    predicates: Path=/api/v1/tourist/chat/**,/api/v1/tourist/asr/**,/api/v1/tourist/tts/**,/api/v1/tourist/weather/**
  - id: geofence
    uri: http://localhost:8085
    predicates: Path=/api/v1/tourist/position/**
  - id: itinerary
    uri: http://localhost:8086
    predicates: Path=/api/v1/tourist/itinerary/**
  - id: safety
    uri: http://localhost:8087
    predicates: Path=/api/v1/tourist/safety/**
